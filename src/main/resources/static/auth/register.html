<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - NexusBank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f8fc; }
        .card { border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: none; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 py-4">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card p-4">
                    <h3 class="text-center mb-4 fw-bold" style="color: #0f172a;">Customer Registration</h3>
                    
                    <div id="messageAlert" class="alert d-none" role="alert"></div>

					<form id="registerForm">
					     <div class="mb-3">
					         <label class="form-label">Name</label>
					         <input type="text" class="form-control" id="name" required minlength="2" title="Name must be at least 2 characters">
					     </div>
					     <div class="mb-3">
					          <label class="form-label">Email</label>
					          <input type="email" class="form-control" id="email" required>
					     </div>
					     <div class="mb-3">
					          <label class="form-label">Password</label>
					          <input type="password" class="form-control" id="password" required minlength="6" title="Password must be at least 6 characters long">
					     </div>
					     <div class="mb-3">
					          <label class="form-label">Phone</label>
					          <input type="text" class="form-control" id="phone" required pattern="^\d{10}$" maxlength="10" title="Phone number must be exactly 10 digits">
					     </div>
					     <div class="mb-4">
					          <label class="form-label">Address</label>
					          <input type="text" class="form-control" id="address" required minlength="5">
					     </div>
					                        
					    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" id="registerBtn">Register</button>
					</form>
                    
                    <div class="text-center mt-3">
                        <a href="login.html" class="text-decoration-none">Already have an account? Login</a>
						<br><br>
						<a href="/index.html" class="text-decoration-none text-muted fw-semibold">&larr; Return to Home Page</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
		// If a user is already logged in, instantly kick them to the homepage
		        if (localStorage.getItem('loggedInUserName')) {
		            window.location.replace('/index.html');
		        }
        document.getElementById('registerForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevents the page from refreshing
            
            const btn = document.getElementById('registerBtn');
            const alertBox = document.getElementById('messageAlert');
            btn.innerText = "Registering...";
            btn.disabled = true;

            // 1. Gather data from the form
            const customerData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value
            };

            // 2. Send POST request to Spring Boot

			fetch('/customers', {
			                method: 'POST',
			                headers: {
			                    'Content-Type': 'application/json'
			                },
			                body: JSON.stringify(customerData)
			            })
			            .then(async response => {
			                const isJson = response.headers.get('content-type')?.includes('application/json');
			                const data = isJson ? await response.json() : await response.text();

			                // 3. Handle the response dynamically
			                if (response.status === 201) {
			                    // Success!
			                    alertBox.className = "alert alert-success";
			                    alertBox.innerText = "User registered successfully! Awaiting KYC Verification.";
			                    alertBox.classList.remove('d-none');
			                    document.getElementById('registerForm').reset(); // Clear the form
			                    
			                } else if (response.status === 400) {
			                    // Catches @Valid errors from the backend (e.g., empty names, bad emails)
			                    alertBox.className = "alert alert-danger";
			                    // Extracts all the error messages from the JSON map and formats them as bullet points
			                    let errorMessages = Object.values(data).join('<br>• ');
			                    alertBox.innerHTML = "<strong>Please check the following:</strong><br>• " + errorMessages;
			                    alertBox.classList.remove('d-none');
			                    
			                } else if (response.status === 404 || response.status === 409) {
			                    // Catches your Duplicate Email/Phone exceptions
			                    alertBox.className = "alert alert-warning";
			                    // If the backend sent a plain string, display it directly
			                    alertBox.innerText = typeof data === 'string' ? data : (data.message || "A conflict occurred.");
			                    alertBox.classList.remove('d-none');
			                    
			                } else {
			                    // Generic Server Error
			                    alertBox.className = "alert alert-danger";
			                    alertBox.innerText = "An error occurred during registration. Please try again later.";
			                    alertBox.classList.remove('d-none');
			                }
			            })
			            .catch(error => {
			                console.error('Error:', error);
			                alertBox.className = "alert alert-danger";
			                alertBox.innerText = "Could not connect to the server. Is Spring Boot running?";
			                alertBox.classList.remove('d-none');
			            })
			            .finally(() => {
			                btn.innerText = "Register";
			                btn.disabled = false;
			            });
        });
    </script>
</body>
</html>
