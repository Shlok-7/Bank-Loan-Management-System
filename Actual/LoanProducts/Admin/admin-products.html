<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Loan Products | LoanSync Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="admin-products.css">
</head>
<body>

    <nav class="navbar custom-admin-nav fixed-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center gap-2 text-white fw-bold" href="#">
                <i class="bi bi-shield-check text-info fs-4"></i>
                LoanSync Admin
            </a>
        </div>
    </nav>

    <main class="container workspace-container">
        
        <a href="#" class="back-link mb-4 d-inline-flex align-items-center gap-2" id="backToBanksLink">
            <i class="bi bi-arrow-left"></i> Back to Banks
        </a>

        <div class="card main-card">
            
            <div class="card-header bg-white border-0 px-4 pt-4 pb-0 d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="bank-title mb-1" id="bank-name-display">Loading...</h2>
                    <p class="text-muted small mb-0 d-flex align-items-center gap-1" id="bank-location-display">
                        <i class="bi bi-geo-alt"></i> Loading...
                    </p>
                </div>
                <button class="btn btn-add-product d-flex align-items-center gap-2 fw-semibold" onclick="openAddProductModal()">
                    <i class="bi bi-plus-lg"></i> Add New Product
                </button>
            </div>

            <div class="card-body p-4">
                <div class="table-responsive">
                    <table class="table custom-table align-middle mb-0">
                        <thead>
                            <tr>
                                <th>PRODUCT ID</th>
                                <th>PRODUCT NAME</th>
                                <th>MIN AMT</th>
                                <th>MAX AMT</th>
                                <th>INTEREST RATE</th>
                                <th>TENURE (MONTHS)</th>
                                <th class="text-end">MANAGE</th>
                            </tr>
                        </thead>
                        <tbody id="product-table-body">
                            </tbody>
                    </table>
                </div>
            </div>
            
        </div>
    </main>

    <div class="modal fade" id="addProductModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0" style="border-radius: 16px;">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold">Add Loan Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="addLoanForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Loan Product Name</label>
                            <input type="text" class="form-control" id="productName" required>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Min Amount</label>
                                <input type="number" class="form-control" id="minAmount" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Max Amount</label>
                                <input type="number" class="form-control" id="maxAmount" required>
                                <div id="errAmount" class="error-text"><i class="bi bi-exclamation-circle"></i> Min < Max required</div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Interest Rate (%)</label>
                                <input type="number" step="0.01" class="form-control" id="interestRate" required>
                                <div id="errRate" class="error-text"><i class="bi bi-exclamation-circle"></i> Must be > 0</div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Tenure (Months)</label>
                                <input type="number" class="form-control" id="tenure" required>
                                <div id="errTenure" class="error-text"><i class="bi bi-exclamation-circle"></i> Must be > 0</div>
                            </div>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary py-2 fw-bold" id="submitProductBtn" disabled>Add Product</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editProductModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0" style="border-radius: 16px;">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold">Edit Loan Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="editLoanForm">
                        <input type="hidden" id="editProductId">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Loan Product Name</label>
                            <input type="text" class="form-control edit-input" id="editProductName" required>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Min Amount</label>
                                <input type="number" class="form-control edit-input" id="editMinAmount" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Max Amount</label>
                                <input type="number" class="form-control edit-input" id="editMaxAmount" required>
                                <div id="errEditAmount" class="error-text"><i class="bi bi-exclamation-circle"></i> Min < Max required</div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Interest Rate (%)</label>
                                <input type="number" step="0.01" class="form-control edit-input" id="editInterestRate" required>
                                <div id="errEditRate" class="error-text"><i class="bi bi-exclamation-circle"></i> Must be > 0</div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Tenure (Months)</label>
                                <input type="number" class="form-control edit-input" id="editTenure" required>
                                <div id="errEditTenure" class="error-text"><i class="bi bi-exclamation-circle"></i> Must be > 0</div>
                            </div>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-info text-white py-2 fw-bold" id="submitEditProductBtn">Update Product</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin-products.js"></script>
</body>
</html>
