spring.application.name=BankLoanManagement
server.port=8091

spring.datasource.url=jdbc:mysql://localhost:3306/bankloanmanagement?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update

# Show the SQL queries Hibernate writes in my console (Great for learning/debugging!)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# Disable browser caching for static resources (Prevents the back-button exploit)
spring.web.resources.cache.period=0
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.no-store=true
spring.web.resources.cache.cachecontrol.must-revalidate=true