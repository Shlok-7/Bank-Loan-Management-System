<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LoanSync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #f4f8fc; 
        }
        .main-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            overflow: hidden; /* Ensures the inner columns respect the border radius */
            max-width: 900px;
            width: 100%;
        }
        .img-container {
            background-color: #ffffff; 
            padding: 2rem;
        }
        .form-container {
            padding: 3rem;
            background-color: #ffffff;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 py-4">

    <div class="container d-flex justify-content-center">
        <!-- Main Centered Box -->
        <div class="main-card">
            <div class="row g-0 h-100">
                
                <!-- Left Side: Image (Hides on smaller screens to save space) -->
                <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center img-container border-end">
                    <!-- Referencing the specific uploaded file -->
                    <img src="/Actual/Images/Screenshot 2026-06-12 152605.png" alt="Login Illustration" class="img-fluid">
                </div>

                <!-- Right Side: Input Boxes -->
                <div class="col-md-6 d-flex align-items-center form-container">
                    <div class="w-100">
                        <h3 class="text-center mb-4 fw-bold" style="color: #0f172a;">Welcome Back</h3>
                        
                        <div id="messageAlert" class="alert d-none" role="alert"></div>

                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label text-muted fw-semibold">Email</label>
                                <input type="email" class="form-control form-control-lg" id="email" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted fw-semibold">Password</label>
                                <input type="password" class="form-control form-control-lg" id="password" required>
                            </div>
                            
                            <button type="submit" class="btn btn-success w-100 py-2 fw-bold fs-6" id="loginBtn">Login</button>
                        </form>
                        
                        <div class="text-center mt-4">
                            <a href="register.html" class="text-decoration-none text-success fw-semibold">Don't have an account? Register</a>
                            <br><br>
                            <a href="/Actual/Customer/Home/index.html" class="text-decoration-none text-muted fw-semibold">&larr; Return to Home Page</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // If a user is already logged in, instantly kick them to the homepage
        if (localStorage.getItem('loggedInUserName')) {
            window.location.replace('index.html');
        }

        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const btn = document.getElementById('loginBtn');
            const alertBox = document.getElementById('messageAlert');
            btn.innerText = "Authenticating...";
            btn.disabled = true;

            const loginData = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            fetch('http://localhost:8086/customers/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(loginData)
            })
            .then(async response => {
                const isJson = response.headers.get('content-type')?.includes('application/json');
                const data = isJson ? await response.json() : await response.text();

                if (response.status === 200) {
                    // Save shared details
                    localStorage.setItem('loggedInUserName', data.name);
                    localStorage.setItem('userRole', data.role);
                    
                    alertBox.className = "alert alert-success";
                    alertBox.classList.remove('d-none');
                    
                    // ROUTING LOGIC
                    if (data.role === 'ADMIN') {
                        alertBox.innerText = "Admin Login successful! Accessing secure portal...";
                        setTimeout(() => { window.location.replace('/Actual/Customer/Admin/admin-dashboard.html'); }, 1000);
                    } else {
                        // It's a regular customer
                        localStorage.setItem('loggedInUserId', data.customerId);
                        alertBox.innerText = "Login successful! Redirecting to homepage...";
                        setTimeout(() => { window.location.replace('/Actual/Customer/Home/index.html'); }, 1000);
                    }
                    
                } else {
                    alertBox.className = "alert alert-danger";
                    alertBox.innerText = data.message || "Invalid email or password.";
                    alertBox.classList.remove('d-none');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alertBox.className = "alert alert-danger";
                alertBox.innerText = "Could not connect to the server.";
                alertBox.classList.remove('d-none');
            })
            .finally(() => {
                btn.innerText = "Login";
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
