<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - LoanSync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            /* Soft, light cool-grey/blue background to complement the image */
            background-color: #f4f7f9; 
        }
        .main-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            overflow: hidden; 
            max-width: 950px;
            width: 100%;
        }
        .img-container {
            background-color: #ffffff; 
            padding: 2rem;
        }
        .form-container {
            padding: 3rem;
            background-color: #ffffff;
        }
        /* Custom styling to match the blue from your uploaded illustration */
        .btn-custom-blue {
            background-color: #427bf5; /* Blue from the illustration button */
            border-color: #427bf5;
            color: white;
            transition: all 0.3s ease;
        }
        .btn-custom-blue:hover {
            background-color: #3168d8;
            border-color: #3168d8;
            color: white;
            box-shadow: 0 4px 12px rgba(66, 123, 245, 0.3);
        }
        .text-custom-blue {
            color: #427bf5;
        }
        .text-custom-blue:hover {
            color: #3168d8;
        }
        .form-control { 
            transition: border-color 0.3s ease, box-shadow 0.3s ease; 
        }
        .form-control:focus {
            border-color: #a1bdff;
            box-shadow: 0 0 0 0.25rem rgba(66, 123, 245, 0.25);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 py-4">

    <div class="container d-flex justify-content-center">
        <div class="main-card">
            <div class="row g-0 h-100">
                
                <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center img-container border-end">
                    <img src="/Actual/Images/Screenshot 2026-06-12 153229.png" alt="Registration Illustration" class="img-fluid p-3">
                </div>

                <div class="col-md-6 d-flex align-items-center form-container">
                    <div class="w-100">
                        <h3 class="text-center mb-4 fw-bold" style="color: #475569;">Sign Up</h3>
                        
                        <div id="messageAlert" class="alert d-none" role="alert"></div>

                        <form id="registerForm">
                             <div class="mb-3">
                                 <label class="form-label text-muted fw-semibold">Name</label>
                                 <input type="text" class="form-control" id="name" required minlength="2">
                                 <div id="nameError" class="text-danger small mt-1 fw-semibold"></div>
                             </div>
                             <div class="mb-3">
                                  <label class="form-label text-muted fw-semibold">Email</label>
                                  <input type="email" class="form-control" id="email" required>
                                  <div id="emailError" class="text-danger small mt-1 fw-semibold"></div>
                             </div>
                             <div class="mb-3">
                                  <label class="form-label text-muted fw-semibold">Password</label>
                                  <input type="password" class="form-control" id="password" required>
                                  <div id="passwordError" class="text-danger small mt-1 fw-semibold"></div>
                             </div>
                             <div class="mb-3">
                                  <label class="form-label text-muted fw-semibold">Phone</label>
                                  <input type="text" class="form-control" id="phone" required maxlength="10">
                                  <div id="phoneError" class="text-danger small mt-1 fw-semibold"></div>
                             </div>
                             <div class="mb-4">
                                  <label class="form-label text-muted fw-semibold">Address</label>
                                  <input type="text" class="form-control" id="address" required minlength="5">
                                  <div id="addressError" class="text-danger small mt-1 fw-semibold"></div>
                             </div>
                                                                        
                            <button type="submit" class="btn btn-custom-blue w-100 py-2 fw-bold" id="registerBtn">Register</button>
                        </form>
                        
                        <div class="text-center mt-4">
                            <span class="text-muted small">Already a member?</span> 
                            <a href="login.html" class="text-decoration-none text-custom-blue fw-bold">Log in</a>
                            <br><br>
                            <a href="/Actual/Customer/Home/index.html" class="text-decoration-none text-muted fw-semibold small">&larr; Return to Home Page</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // If a user is already logged in, instantly kick them to the homepage
        if (localStorage.getItem('loggedInUserName')) {
            window.location.replace('/index.html');
        }

        // ==========================================
        // 1. REAL-TIME VALIDATION
        // ==========================================
        
        // Name Check
        document.getElementById('name').addEventListener('input', function() {
            let errorDiv = document.getElementById('nameError');
            if (this.value.length > 0 && this.value.length < 2) {
                errorDiv.innerText = "Name must be at least 2 characters.";
            } else {
                errorDiv.innerText = "";
            }
        });

        // Email Check
        document.getElementById('email').addEventListener('input', function() {
            let errorDiv = document.getElementById('emailError');
            let email = this.value;
            let emailPattern = /\S+@\S+\.\S+/;

            if (email.length > 0) {
                if (!emailPattern.test(email)) {
                    errorDiv.innerText = "Please enter a valid email address (e.g., name@domain.com).";
                } else {
                    errorDiv.innerText = "";
                }
            } else {
                errorDiv.innerText = "";
            }
        });

        // Password Check
        document.getElementById('password').addEventListener('input', function() {
            let errorDiv = document.getElementById('passwordError');
            let password = this.value;

            if (password.length > 0) {
                if (password.length < 6) {
                    errorDiv.innerText = "Password must be at least 6 characters long.";
                } else if (!/[A-Z]/.test(password)) {
                    errorDiv.innerText = "Password must contain at least one uppercase letter (A-Z).";
                } else if (!/[!@#$%^&*(),.?":{}|<>]/.test(password)) {
                    errorDiv.innerText = "Password must contain at least one special character (like @, #, $, etc.).";
                } else {
                    errorDiv.innerText = "";
                }
            } else {
                errorDiv.innerText = "";
            }
        });

        // Phone Check
        document.getElementById('phone').addEventListener('input', function() {
            let errorDiv = document.getElementById('phoneError');
            this.value = this.value.replace(/\D/g, '');

            if (this.value.length > 0 && this.value.length < 10) {
                errorDiv.innerText = "Need exactly 10 digits. You have " + this.value.length + ".";
            } else {
                errorDiv.innerText = "";
            }
        });

        // Address Check
        document.getElementById('address').addEventListener('input', function() {
            let errorDiv = document.getElementById('addressError');
            if (this.value.length > 0 && this.value.length < 5) {
                errorDiv.innerText = "Address must be at least 5 characters.";
            } else {
                errorDiv.innerText = "";
            }
        });

        // ==========================================
        // 2. FORM SUBMISSION LOGIC
        // ==========================================
        
        document.getElementById('registerForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            if(document.getElementById('phone').value.length !== 10) {
                document.getElementById('phoneError').innerText = "Phone must be exactly 10 digits before registering.";
                return;
            }
            
            const btn = document.getElementById('registerBtn');
            const alertBox = document.getElementById('messageAlert');
            btn.innerText = "Registering...";
            btn.disabled = true;

            const customerData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value
            };

            fetch('http://localhost:8086/customers', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(customerData)
            })
            .then(async response => {
                const isJson = response.headers.get('content-type')?.includes('application/json');
                const data = isJson ? await response.json() : await response.text();

                if (response.status === 201) {
                    alertBox.className = "alert alert-success";
                    alertBox.innerText = "User registered successfully! Awaiting KYC Verification.";
                    alertBox.classList.remove('d-none');
                    document.getElementById('registerForm').reset();
                    document.querySelectorAll('.text-danger').forEach(el => el.innerText = '');
                    
                } else if (response.status === 400) {
                    alertBox.className = "alert alert-danger";
                    let errorMessages = Object.values(data).join('<br>• ');
                    alertBox.innerHTML = "<strong>Please check the following:</strong><br>• " + errorMessages;
                    alertBox.classList.remove('d-none');
                    
                } else if (response.status === 404 || response.status === 409) {
                    alertBox.className = "alert alert-warning";
                    alertBox.innerText = typeof data === 'string' ? data : (data.message || "A conflict occurred.");
                    alertBox.classList.remove('d-none');
                    
                } else {
                    alertBox.className = "alert alert-danger";
                    alertBox.innerText = "An error occurred during registration. Please try again later.";
                    alertBox.classList.remove('d-none');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alertBox.className = "alert alert-danger";
                alertBox.innerText = "Could not connect to the server. Is Spring Boot running?";
                alertBox.classList.remove('d-none');
            })
            .finally(() => {
                btn.innerText = "Register";
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
